# Prometheus configuration for AegisIQ
# Add this to your monitoring stack (docker-compose, Kubernetes, etc.)

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "aegisiq-backend"
    static_configs:
      - targets: ["backend:8000"]
    metrics_path: "/metrics"
    scrape_interval: 10s

  - job_name: "aegisiq-nginx"
    static_configs:
      - targets: ["nginx:80"]
    # Uncomment when nginx-prometheus-exporter is added:
    # metrics_path: "/nginx_status"

  - job_name: "aegisiq-postgres"
    static_configs:
      - targets: ["postgres:5432"]
    # Uncomment when postgres-exporter is added:
    # metrics_path: "/metrics"

# Alert rules (optional)
# rule_files:
#   - "alerts/*.yml"
