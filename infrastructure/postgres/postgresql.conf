# PostgreSQL Configuration for AegisIQ
# Custom PostgreSQL settings for production use.

# Memory
shared_buffers = 256MB
effective_cache_size = 1GB
work_mem = 4MB
maintenance_work_mem = 128MB

# Write-Ahead Log
wal_buffers = 16MB
checkpoint_completion_target = 0.9

# Connections
max_connections = 100

# Query Planning
random_page_cost = 1.1
effective_io_concurrency = 200

# Logging (Alpine-compatible: no logging_collector, no custom log_directory)
log_destination = 'stderr'
log_min_duration_statement = 1000
log_checkpoints = on
log_connections = on
log_disconnections = on

# Locale
timezone = 'UTC'
