services:
  frontend:
    build:
      context: ./frontend
      dockerfile: ../infrastructure/docker/Dockerfile.frontend
    container_name: aegisiq_frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - aegisiq_network
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.backend
    container_name: aegisiq_backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-aegisiq}:${POSTGRES_PASSWORD:-aegisiq_dev_2026}@postgres:5432/${POSTGRES_DB:-aegisiq}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - aegisiq_network
    restart: unless-stopped
    volumes:
      - backend_logs:/app/logs

  postgres:
    image: postgres:16-alpine
    container_name: aegisiq_postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aegisiq}
      POSTGRES_USER: ${POSTGRES_USER:-aegisiq}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aegisiq_dev_2026}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./infrastructure/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aegisiq} -d ${POSTGRES_DB:-aegisiq}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - aegisiq_network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: aegisiq_nginx
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - aegisiq_network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: aegisiq_prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./infrastructure/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
    networks:
      - aegisiq_network
    restart: unless-stopped

volumes:
  pgdata:
    driver: local
  backend_logs:
    driver: local
  prometheus_data:
    driver: local

networks:
  aegisiq_network:
    driver: bridge
